name: Deploy

# Safety model:
#   * push to main       -> PLAN ONLY for infra (no apply, no migrate) + auto-deploy
#                           of the STATIC marketing site (apps/site) to S3+CloudFront.
#                           The site sync mutates nothing but static content — no
#                           infra/DB/API changes happen on merge.
#   * workflow_dispatch  -> APPLY + migrate + web/API deploy to the chosen env,
#                           behind a GitHub Environment (protected — reviewer
#                           approval — for staging/prod; require it on dev too).
# OIDC to AWS — no static keys. Configure repo/environment vars: AWS_ROLE_ARN,
# WEB_BUCKET, CF_DISTRIBUTION_ID, API_FUNCTION_NAME, API_BASE_URL, SITE_BUCKET,
# SITE_CF_DISTRIBUTION_ID (= TF outputs site_bucket / site_distribution_id), and
# the TF backend.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      env:
        description: Target environment
        type: choice
        options: [dev, staging, prod]
        default: dev

permissions:
  id-token: write
  contents: read

jobs:
  # Merge to main only PLANS (against dev) — a human promotes via workflow_dispatch.
  plan:
    if: github.event_name == 'push'
    name: plan (dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: '1.9.8' }
      - run: pnpm install --frozen-lockfile
      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-west-3
      - name: Terraform plan (dev)
        working-directory: infra/terraform/envs/dev
        run: |
          terraform init
          terraform plan -input=false

  # Static marketing site (apps/site) — auto-deployed on every push to main.
  # Deliberately NOT environment-gated: it only syncs static files to the site's
  # own S3 bucket + invalidates CloudFront. It never touches infra, the DB, the
  # web app or the API, so "deploy on push" here is low-risk.
  site:
    if: github.event_name == 'push'
    name: deploy site (dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-west-3
      - name: Sync site to S3 + invalidate CloudFront
        run: |
          # Static assets: short cache; index.html: no-cache so edits show live.
          aws s3 sync apps/site "s3://${{ vars.SITE_BUCKET }}" --delete \
            --exclude '.DS_Store' --cache-control 'public,max-age=300'
          aws s3 cp apps/site/index.html "s3://${{ vars.SITE_BUCKET }}/index.html" \
            --cache-control 'no-cache' --content-type 'text/html; charset=utf-8'
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.SITE_CF_DISTRIBUTION_ID }}" --paths '/*'

  # Manual, environment-gated apply + deploy.
  deploy:
    if: github.event_name == 'workflow_dispatch'
    name: deploy ${{ inputs.env }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.env }} # protect dev/staging/prod with reviewer approval
    env:
      TARGET: ${{ inputs.env }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: '1.9.8' }

      - run: pnpm install --frozen-lockfile

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-west-3

      - name: Terraform apply (${{ env.TARGET }})
        working-directory: infra/terraform/envs/${{ env.TARGET }}
        run: |
          terraform init
          terraform apply -auto-approve

      - name: DB migrate (guarded)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm db:migrate

      - name: Build & deploy web (S3 + CloudFront)
        run: |
          pnpm --filter @pilotage/web build
          aws s3 sync apps/web/dist "s3://${{ vars.WEB_BUCKET }}" --delete
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CF_DISTRIBUTION_ID }}" --paths '/*'

      - name: Package & deploy API (Lambda)
        run: |
          # Bundle the NestJS Lambda handler. NestJS DI needs correct
          # emitDecoratorMetadata, which plain esbuild/transpileModule can't
          # produce, so the build uses SWC (see apps/api/build.lambda.mjs).
          pnpm --filter @pilotage/api run build:lambda
          (cd apps/api/dist && zip -q lambda.zip lambda.js)
          aws lambda update-function-code \
            --function-name "${{ vars.API_FUNCTION_NAME }}" \
            --zip-file fileb://apps/api/dist/lambda.zip

      - name: Smoke test
        run: curl -fsS "${{ vars.API_BASE_URL }}/health"
