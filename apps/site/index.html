          ${[t.demo.step1,t.demo.step2,t.demo.step3].map((s,i)=>`<div style="display:flex;gap:12px;align-items:flex-start"><span style="width:26px;height:26px;border-radius:7px;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600">${i+1}</span><span style="font-size:14.5px;color:var(--fg-muted)">${s}</span></div>`).join('')}
        </div>
      </div>
      <div style="border:1px solid var(--border);border-radius:18px;padding:30px;background:var(--surface);box-shadow:var(--shadow-lg)">
        ${sent ? `<div style="text-align:center;padding:24px 8px">
          <div style="width:54px;height:54px;border-radius:14px;background:var(--ok-soft);color:var(--ok);display:flex;align-items:center;justify-content:center;margin:0 auto 18px"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
          <h3 style="margin:0 0 8px;font-size:20px;font-weight:700">${t.demo.sentT}</h3>
          <p style="margin:0;font-size:14.5px;color:var(--fg-muted)">${t.demo.sentD}</p>
        </div>` : `<form data-form="demo" style="display:flex;flex-direction:column;gap:15px">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div><label style="font-size:12.5px;font-weight:600;color:var(--fg-muted);display:block;margin-bottom:6px">${t.demo.fName}</label><input required name="name" placeholder="${t.demo.phName}" style="width:100%;height:42px;padding:0 12px;border:1px solid var(--border-strong);border-radius:9px;font-family:inherit;font-size:14px;background:var(--surface-2)"/></div>
            <div><label style="font-size:12.5px;font-weight:600;color:var(--fg-muted);display:block;margin-bottom:6px">${t.demo.fCompany}</label><input name="company" placeholder="${t.demo.phCompany}" style="width:100%;height:42px;padding:0 12px;border:1px solid var(--border-strong);border-radius:9px;font-family:inherit;font-size:14px;background:var(--surface-2)"/></div>
          </div>
          <div><label style="font-size:12.5px;font-weight:600;color:var(--fg-muted);display:block;margin-bottom:6px">${t.demo.fEmail}</label><input required name="email" type="email" placeholder="${t.demo.phEmail}" style="width:100%;height:42px;padding:0 12px;border:1px solid var(--border-strong);border-radius:9px;font-family:inherit;font-size:14px;background:var(--surface-2)"/></div>
          <div><label style="font-size:12.5px;font-weight:600;color:var(--fg-muted);display:block;margin-bottom:6px">${t.demo.fSites}</label><input name="sites" placeholder="${t.demo.phSites}" style="width:100%;height:42px;padding:0 12px;border:1px solid var(--border-strong);border-radius:9px;font-family:inherit;font-size:14px;background:var(--surface-2)"/></div>
          <div><label style="font-size:12.5px;font-weight:600;color:var(--fg-muted);display:block;margin-bottom:6px">${t.demo.fMsg}</label><textarea name="message" placeholder="${t.demo.phMsg}" style="width:100%;height:80px;padding:10px 12px;border:1px solid var(--border-strong);border-radius:9px;font-family:inherit;font-size:14px;background:var(--surface-2);resize:vertical"></textarea></div>
          <button type="submit" class="btn-primary" style="height:48px;border:0;border-radius:11px;background:var(--primary);color:#fff;font-weight:700;font-size:15px;cursor:pointer;margin-top:4px">${t.demo.submit}</button>
          <div style="font-size:11.5px;color:var(--fg-subtle);line-height:1.45;text-align:center">${t.demo.consent}</div>
        </form>`}
      </div>
    </div>
  </main>`;
}

function legalView(t, sec){
  const keys = sec==='legal' ? ['h1','h2','h3','h4','h5','h6'] : ['h1','h2','h3','h4','h5','h6','h7'];
  return `<main style="max-width:820px;margin:0 auto;padding:60px 28px 88px">
    <a data-act="home" class="footlnk" style="display:inline-flex;align-items:center;gap:7px;font-size:14px;color:var(--fg-muted);cursor:pointer;margin-bottom:28px;text-decoration:none">${I.arrowL}${t.back}</a>
    <h1 style="margin:0 0 8px;font-size:34px;letter-spacing:-1px;font-weight:800">${t[sec].title}</h1>
    <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--fg-subtle);margin-bottom:36px">${t[sec].updated}</div>
    <div style="display:flex;flex-direction:column;gap:28px;font-size:15px;color:var(--fg-muted);line-height:1.65">
      ${keys.map(h=>`<div><h3 style="margin:0 0 8px;font-size:16px;font-weight:700;color:var(--fg)">${t[sec][h]}</h3><p style="margin:0">${t[sec]['b'+h.slice(1)]}</p></div>`).join('')}
    </div>
  </main>`;
}

function footer(t){
  return `<footer style="border-top:1px solid var(--border);background:var(--surface-2)">
    <div class="grid-foot" style="max-width:1200px;margin:0 auto;padding:48px 28px 34px;display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:40px">
      <div>
        <div style="display:flex;align-items:center;gap:11px;margin-bottom:14px">
          <div style="width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#5B8DEF,#1B4DB3);display:flex;align-items:center;justify-content:center">${MARK.replaceAll('{S}','18')}</div>
          <span style="font-weight:800;font-size:17px;letter-spacing:-.3px">Lavo<span style="color:var(--primary)">Pilot</span></span>
        </div>
        <p style="margin:0 0 12px;font-size:13.5px;color:var(--fg-muted);max-width:280px;line-height:1.55">${t.footer.tagline}</p>
        <div style="font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--fg-subtle)">🇫🇷 ${t.footer.madeIn}</div>
      </div>
      <div>
        <div style="font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--fg-subtle);margin-bottom:14px">${t.footer.product}</div>
        <div style="display:flex;flex-direction:column;gap:9px">
          <a href="#features" data-act="home" class="footlnk" style="font-size:14px;color:var(--fg-muted);text-decoration:none">${t.nav.features}</a>
          <a href="#ai" data-act="home" class="footlnk" style="font-size:14px;color:var(--fg-muted);text-decoration:none">${t.nav.ai}</a>
          <a href="${APP_LOGIN_URL}" class="footlnk" style="font-size:14px;color:var(--fg-muted);text-decoration:none">${t.nav.login}</a>
          <a data-act="demo" class="footlnk" style="font-size:14px;color:var(--fg-muted);text-decoration:none;cursor:pointer">${t.nav.demo}</a>
        </div>
      </div>
      <div>
        <div style="font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--fg-subtle);margin-bottom:14px">${t.footer.legal}</div>
        <div style="display:flex;flex-direction:column;gap:9px">
          <a data-act="legal" class="footlnk" style="font-size:14px;color:var(--fg-muted);text-decoration:none;cursor:pointer">${t.legal.title}</a>
          <a data-act="cgu" class="footlnk" style="font-size:14px;color:var(--fg-muted);text-decoration:none;cursor:pointer">${t.cgu.title}</a>
          <a href="mailto:paul@lavopilot.com" class="footlnk" style="font-size:14px;color:var(--fg-muted);text-decoration:none">paul@lavopilot.com</a>
        </div>
      </div>
    </div>
    <div style="border-top:1px solid var(--border);padding:18px 28px"><div style="max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:12.5px;color:var(--fg-subtle)"><span>© 2026 LavoPilot SAS. ${t.footer.rights}</span><span style="font-family:'JetBrains Mono',monospace">LavoPilot SAS · France</span></div></div>
  </footer>`;
}

function render(){
  const t = DICT[state.lang] || DICT.fr;
  document.documentElement.lang = state.lang;
  let body;
  if(state.view==='demo') body = demoView(t);
  else if(state.view==='legal') body = legalView(t,'legal');
  else if(state.view==='cgu') body = legalView(t,'cgu');
  else body = homeView(t);
  document.getElementById('app').innerHTML = header(t) + body + footer(t);
}

function go(view){ state.view=view; render(); window.scrollTo(0,0); }

document.addEventListener('click', (e)=>{
  const el = e.target.closest('[data-act]');
  if(!el) return;
  const act = el.getAttribute('data-act');
  if(act==='fr'){ state.lang='fr'; render(); return; }
  if(act==='en'){ state.lang='en'; render(); return; }
  if(act==='home'){ const hash=el.getAttribute('href'); if(state.view!=='home'){ e.preventDefault(); go('home'); if(hash) setTimeout(()=>{ location.hash=hash; },0); } return; }
  if(['demo','legal','cgu'].includes(act)){ e.preventDefault(); go(act); }
});
async function submitDemo(form){
  const data = Object.fromEntries(new FormData(form).entries());
  const payload = {
    name: data.name || '', company: data.company || '', email: data.email || '',
    sites: data.sites || '', message: data.message || '',
    locale: state.lang, source: 'marketing-site',
  };
  // Optimistically show confirmation; leads still deliver even if the tab closes.
  state.demoSent = true; render();
  try {
    await fetch(LEADS_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
  } catch (err) {
    console.error('Lead submission failed', err);
  }
}
document.addEventListener('submit', (e)=>{
  if(e.target.getAttribute('data-form')==='demo'){ e.preventDefault(); submitDemo(e.target); }
});

render();
</script>
</body>
</html>
